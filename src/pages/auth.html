<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kinetic Architect/Auth</title>
    <meta charset="UTF-8">
    <meta name="viewport" name="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/pages/auth.css">
</head>
<body>
    <main class="main">
        <div class="main-content">
            <div class="main-content__header">
                <div class="kinetic">
                    <svg width="20" height="16" viewBox="0 0 20 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 16C1.45 16 0.979167 15.8042 0.5875 15.4125C0.195833 15.0208 0 14.55 0 14V2C0 1.45 0.195833 0.979167 0.5875 0.5875C0.979167 0.195833 1.45 0 2 0H18C18.55 0 19.0208 0.195833 19.4125 0.5875C19.8042 0.979167 20 1.45 20 2V14C20 14.55 19.8042 15.0208 19.4125 15.4125C19.0208 15.8042 18.55 16 18 16H2ZM2 14H18V4H2V14ZM5.5 13L4.1 11.6L6.675 9L4.075 6.4L5.5 5L9.5 9L5.5 13ZM10 13V11H16V13H10Z" fill="#A3A6FF"/>
                    </svg>
                    <h2>Kinetic Architect</h2>
                </div>
                <p>PRECISION ENGINEERED WORKSPACE</p>
            </div>
            <div class="main-content__center">
                <div class="title">
                    <h2>Welcome back</h2>
                    <p>Enter your credentials to access your engine room.</p>
                </div>
                <form action="#" class="auth">
                    <label for="mail">EMAIL ADDRESS
                        <span class="mail-err"></span>
                    </label>
                    <input type="mail" id="mail" name="mail" placeholder="architect@kinetic.io">
                    <div class="pas-container">
                        <label for="pas">SECURITY KEY
                            <span class="pas-err"></span>
                        </label>
                        <p>RECOVER</p>
                    </div>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                    <button class="initialize">Initialize Session</button>
                </form>
            </div>
            <div class="main-content__footer">

            </div>
        </div>
    </main>
    <footer class="footer">
        <p class="footer-left">© 2024 Kinetic Architect. Engineered for the web.</p>
        <nav class="footer-right">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Security</a>
            <a href="#">Status</a>
        </nav>
    </footer>
    <script src="../js/pages/auth.js"></script>
</body>
</html>
